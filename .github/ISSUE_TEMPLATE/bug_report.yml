name: Bug Report
description: Report a bug in Provena
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I call trail.log() with..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      render: python
      placeholder: |
        from provena import ContextTrail
        trail = ContextTrail(backend="memory")
        # ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or tracebacks.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Provena version
      placeholder: "0.5.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Storage backend
      options:
        - SQLite (default)
        - InMemory
        - Not applicable
    validations:
      required: true
